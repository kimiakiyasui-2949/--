<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;line-height:1.6}
a{text-decoration:none}
header{position:fixed;width:100%;top:0;left:0;background:rgba(0,0,0,0.6);padding:15px 30px;z-index:10;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Oleo Script',system-ui;font-size:clamp(22px,2.8vw,30px);font-weight:700;letter-spacing:.02em;line-height:1.05;white-space:nowrap}
.menu-wrapper{position:relative}
.menu-toggle{position:relative;z-index:12;width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:transparent;border:1px solid rgba(255,255,255,0.45);cursor:pointer}
.menu-toggle span{width:20px;height:2px;background:#fff}
.menu{position:fixed;top:0;left:0;width:100%;height:66vh;padding:96px 30px 30px;background:rgba(255,255,255,0.82);backdrop-filter:blur(6px);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-100%);transform-origin:top;transition:opacity .35s ease,transform .35s ease,visibility .35s ease;z-index:11}
.menu.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
.menu a{display:block;padding:14px 0;color:#000;font-size:20px;border-bottom:1px solid rgba(0,0,0,0.12);text-decoration:none;background-image:linear-gradient(#c40018,#c40018);background-repeat:no-repeat;background-size:0 2px;background-position:left calc(100% - 6px);transition:background-size .2s ease,color .2s ease}
.menu a:hover,.menu a:focus-visible{color:#c40018;background-size:100% 2px}
.main{min-height:100vh;padding:140px 20px 80px;max-width:900px;margin:0 auto}
.main h2{font-size:48px;font-family:'Playfair Display',serif;margin-bottom:20px}
.main p{margin-bottom:14px}
footer{text-align:center;padding:40px;background:#111}
@media(min-width:768px){
.main h2{font-size:64px}
}
</style>
</head>
<body>
<header>
<h1>Photographer Ustubo Kento</h1>
<div class="menu-wrapper">
<button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
<span></span>
<span></span>
<span></span>
</button>
<nav class="menu" id="site-menu">
<a href="index.html">Home</a>
<a href="salt-desert.html">Work</a>
<a href="beauty.html">Beauty</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>
<section class="main">
<h2>Contact</h2>

<p>Email: hello@example.com</p>
<p>Instagram: @ustubo_kento</p>
</section>
<footer>
<p>© 2026 Photography Adventure</p>
</footer>
<script>
const menuToggle = document.querySelector('.menu-toggle');
const menu = document.querySelector('.menu');

menuToggle.addEventListener('click', () => {
const isOpen = menu.classList.toggle('open');
menuToggle.setAttribute('aria-expanded', String(isOpen));
});

document.addEventListener('click', (event) => {
if (!event.target.closest('.menu-wrapper')) {
menu.classList.remove('open');
menuToggle.setAttribute('aria-expanded', 'false');
}
});

document.addEventListener('keydown', (event) => {
if (event.key === 'Escape') {
menu.classList.remove('open');
menuToggle.setAttribute('aria-expanded', 'false');
}
});
</script>
</body>
</html>
