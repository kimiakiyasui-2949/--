<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;line-height:1.6}
img{width:100%;display:block}
a{text-decoration:none}
.photo-grid img{cursor:pointer}
.photo-grid img{opacity:1;transform:none;transition:none}
.photo-grid img.in-view{opacity:1;transform:none}

header{position:fixed;width:100%;top:0;left:0;background:rgba(0,0,0,0.6);padding:15px 30px;z-index:10;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Oleo Script',system-ui;font-size:clamp(22px,2.8vw,30px);font-weight:700;letter-spacing:.02em;line-height:1.05;white-space:nowrap}
.menu-wrapper{position:relative}
.menu-toggle{position:relative;z-index:12;width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:transparent;border:1px solid rgba(255,255,255,0.45);cursor:pointer}
.menu-toggle span{width:20px;height:2px;background:#fff}
.menu{position:fixed;top:0;left:0;width:100%;height:66vh;padding:96px 30px 30px;background:rgba(255,255,255,0.82);backdrop-filter:blur(6px);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-100%);transform-origin:top;transition:opacity .35s ease,transform .35s ease,visibility .35s ease;z-index:11}
.menu.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
.menu a{display:block;padding:14px 0;color:#000;font-size:20px;border-bottom:1px solid rgba(0,0,0,0.12);text-decoration:none;background-image:linear-gradient(#c40018,#c40018);background-repeat:no-repeat;background-size:0 2px;background-position:left calc(100% - 6px);transition:background-size .2s ease,color .2s ease}
.menu a:hover,.menu a:focus-visible{color:#c40018;background-size:100% 2px}

.hero{min-height:100vh;padding:110px 20px 60px;background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.75)),url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;display:flex;align-items:center}
.content{max-width:720px;margin:auto}
.content h2{font-size:48px;font-family:'Playfair Display',serif;margin-bottom:16px}
.content p{margin-bottom:14px}
.back-link{display:inline-block;margin-top:14px;padding:12px 30px;background:#fff;color:#000}
.gallery{padding:80px 20px 100px;max-width:1200px;margin:auto}
.gallery h3{font-size:32px;font-family:'Playfair Display',serif;margin-bottom:24px}
.photo-grid{display:grid;grid-template-columns:1fr;gap:18px}
.photo-grid img{height:280px;object-fit:cover}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;padding:0;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .25s ease;z-index:30}
.lightbox.open{opacity:1;visibility:visible;pointer-events:auto}
.lightbox img{width:100vw;height:auto;max-width:none;max-height:100vh;object-fit:contain}
.lightbox img.portrait{width:auto;height:100vh;max-width:100vw;max-height:none}
.lightbox-close,.lightbox-prev,.lightbox-next{position:absolute;border:none;background:rgba(255,255,255,0.18);color:#fff;cursor:pointer}
.lightbox-close{top:24px;right:24px;width:48px;height:48px;font-size:28px}
.lightbox-prev,.lightbox-next{top:50%;transform:translateY(-50%);width:52px;height:52px;font-size:28px}
.lightbox-prev{left:24px}
.lightbox-next{right:24px}
footer{text-align:center;padding:40px;background:#111}

@media(min-width:768px){
.content h2{font-size:64px}
.photo-grid{grid-template-columns:repeat(2,1fr)}
.photo-grid img:first-child{grid-column:span 2;height:420px}
}
</style>
</head>
<body>
<header>
<h1>Photographer Ustubo Kento</h1>
<div class="menu-wrapper">
<button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
<span></span>
<span></span>
<span></span>
</button>
<nav class="menu" id="site-menu">
<a href="index.html">Home</a>
<a href="salt-desert.html">Work</a>
<a href="beauty.html">Beauty</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>

<section class="hero">
<div class="content">
<h2>Beauty</h2>
<p>What isn’t said speaks</p>

</div>
</section>

<section class="gallery">
<h3>Photo Gallery</h3>
<div class="photo-grid">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Beauty landscape 1">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Beauty landscape 2">
<img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" alt="Beauty landscape 3">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Beauty landscape 4">
<img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Beauty landscape 5">
</div>
</section>

<footer>
<p>© 2026 Kimiaki Yasui</p>
</footer>

<div class="lightbox" aria-hidden="true">
<button class="lightbox-close" type="button" aria-label="Close image viewer">×</button>
<button class="lightbox-prev" type="button" aria-label="Previous image">‹</button>
<img class="lightbox-image" src="" alt="Expanded photograph">
<button class="lightbox-next" type="button" aria-label="Next image">›</button>
</div>

<script>
const menuToggle = document.querySelector('.menu-toggle');
const menu = document.querySelector('.menu');
const galleryImages = Array.from(document.querySelectorAll('.photo-grid img'));
const lightbox = document.querySelector('.lightbox');
const lightboxImage = document.querySelector('.lightbox-image');
const lightboxClose = document.querySelector('.lightbox-close');
const lightboxPrev = document.querySelector('.lightbox-prev');
const lightboxNext = document.querySelector('.lightbox-next');
let currentImageIndex = 0;

const updateLightboxOrientation = () => {
lightboxImage.classList.toggle('portrait', lightboxImage.naturalHeight > lightboxImage.naturalWidth);
};

lightboxImage.addEventListener('load', updateLightboxOrientation);

menuToggle.addEventListener('click', () => {
const isOpen = menu.classList.toggle('open');
menuToggle.setAttribute('aria-expanded', String(isOpen));
});

document.addEventListener('click', (event) => {
if (!event.target.closest('.menu-wrapper')) {
menu.classList.remove('open');
menuToggle.setAttribute('aria-expanded', 'false');
}
});

document.addEventListener('keydown', (event) => {
if (event.key === 'Escape') {
menu.classList.remove('open');
menuToggle.setAttribute('aria-expanded', 'false');
}
});

const renderLightboxImage = () => {
const activeImage = galleryImages[currentImageIndex];
lightboxImage.src = activeImage.src;
lightboxImage.alt = activeImage.alt || 'Expanded photograph';
};

const openLightbox = (index) => {
currentImageIndex = index;
renderLightboxImage();
lightbox.classList.add('open');
lightbox.setAttribute('aria-hidden', 'false');
};

const closeLightbox = () => {
lightbox.classList.remove('open');
lightbox.setAttribute('aria-hidden', 'true');
};

const showNextImage = () => {
currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
renderLightboxImage();
};

const showPrevImage = () => {
currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
renderLightboxImage();
};

galleryImages.forEach((image, index) => {
image.addEventListener('click', () => openLightbox(index));
});

lightboxClose.addEventListener('click', closeLightbox);
lightboxNext.addEventListener('click', showNextImage);
lightboxPrev.addEventListener('click', showPrevImage);

lightbox.addEventListener('click', (event) => {
if (event.target === lightbox) {
closeLightbox();
}
});

document.addEventListener('keydown', (event) => {
if (!lightbox.classList.contains('open')) {
return;
}
if (event.key === 'ArrowRight') {
showNextImage();
}
if (event.key === 'ArrowLeft') {
showPrevImage();
}
if (event.key === 'Escape') {
closeLightbox();
}
});
</script>
</body>
</html>
